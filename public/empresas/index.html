<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Empresas</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, Arial; background:#f7fafc; padding:24px }
    .card { max-width:1000px; margin:auto; background:#fff; padding:20px; border-radius:8px }
    h1 { margin-bottom:4px }
    .total { font-size:16px; font-weight:600; margin-bottom:16px }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #f1f5f9; padding: 8px; text-align: left; border: 1px solid #e2e8f0; font-weight: 600; font-size: 12px; }
    .data-table td { padding: 8px; border: 1px solid #e2e8f0; font-size: 14px; }
    .data-table tr:nth-child(even) { background: #f8fafc; }
    .empresa-block h3 { font-size:15px; font-weight:600; margin-bottom:4px; color:#0f172a }
    .empresa-block canvas { max-width:100%; height:420px; margin-bottom:32px }
  </style>
  <script src="../components/auth.js"></script>
  <script src="../components/utils.js"></script>
  <script src="../components/pdf-section-builder.js"></script>
  <script src="../components/pdf-generator.js"></script>
  <script src="../components/period-selector.js"></script>
  <script src="../components/nav-bar-custom.js" defer></script>
</head>
<body>
  <nav-bar-custom></nav-bar-custom>
  <div class="card">
    <h1>Empresas</h1>

    <div id="periodoContainer"></div>

    <div id="total" class="total">Cargando...</div>

    <div id="empresaCharts"></div>

    <table class="data-table">
      <thead>
        <tr>
          <th>Empresa</th>
          <th>Total</th>
          <th>Cantidad de Facturas</th>
          <th>% de Ventas</th>
        </tr>
      </thead>
      <tbody id="tablaEmpresas"></tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    if (!Auth.isAuthenticated()) { window.location.href = '/login'; }

    let chartInstances = [];

    async function render(mes, año, includePP) {
      const res = await authFetch(`/facturas/empresas${mes ? `?mes=${mes}` : año ? `?año=${año}` : ''}`);
      if (!res) return;
      const resultado = (await res.json()).data;

      chartInstances.forEach(c => c.destroy());
      chartInstances = [];

      // Construir mapa por región usando mapEmpresa de utils.js
      const empresaMap = {};
      resultado.datos.forEach(f => {
        const region = mapEmpresa(f.empresa);
        if (!empresaMap[region]) empresaMap[region] = { ingresos: 0, ventas: 0, dimensiones: {} };
        empresaMap[region].ingresos += Number(f.totalVentas) || 0;
        empresaMap[region].ventas   += Number(f.cantidadFacturas) || 0;
        Object.entries(f.dimensiones || {}).forEach(([dim, val]) => {
          empresaMap[region].dimensiones[dim] = (empresaMap[region].dimensiones[dim] || 0) + Number(val);
        });
      });

      const ordenFijo      = ['Argentina', 'España', 'Chile', 'Otros'];
      const sortedEmpresas = ordenFijo.filter(e => empresaMap[e]).map(e => [e, empresaMap[e]]);

      // Total general usando calcularMontoPP de utils.js
      const totalVentasGlobal = sortedEmpresas.reduce((s, [, d]) => {
        const pp = calcularMontoPP(d.dimensiones);
        return s + (includePP ? d.ingresos : d.ingresos - pp);
      }, 0);
      const totalFacturas = sortedEmpresas.reduce((s, [, d]) => s + d.ventas, 0);

      document.getElementById('total').textContent =
        `Total: ${formatMoney(totalVentasGlobal)} · Facturas: ${totalFacturas}`;

      const container = document.getElementById('empresaCharts');
      container.innerHTML = '';

      sortedEmpresas.forEach(([region, data]) => {
        const pp = calcularMontoPP(data.dimensiones);

        let dims = Object.entries(data.dimensiones || {}).sort((a, b) => b[1] - a[1]);
        if (!includePP) dims = dims.filter(([k]) => !esPP(k));

        const totalMostrado = includePP ? Number(data.ingresos || 0) : Number(data.ingresos || 0) - pp;

        const labels = ['Total', ...dims.map(([d]) => d)];
        const values = [totalMostrado, ...dims.map(([, v]) => v)];
        const colors = ['#0ea5a4', ...dims.map((_, i) => DIM_COLORS[i % DIM_COLORS.length])];

        const block = document.createElement('div');
        block.className = 'empresa-block';
        block.innerHTML = `<h3>${region}</h3><canvas id="chart-${region}"></canvas>`;
        container.appendChild(block);

        const ctx      = block.querySelector(`#chart-${region}`).getContext('2d');
        const instance = new Chart(ctx, {
          type: 'bar',
          data: { labels, datasets: [{ label: 'Ingresos', data: values, backgroundColor: colors }] },
          options: {
            responsive: true,
            interaction: { mode: 'nearest', intersect: false },
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: ctx => formatMoney(ctx.raw) } },
            },
            scales: { y: { beginAtZero: true, ticks: { callback: v => formatMoney(v) } } },
          },
        });
        chartInstances.push(instance);
      });

      document.getElementById('tablaEmpresas').innerHTML = sortedEmpresas.map(([empresa, data]) => {
        const pp            = calcularMontoPP(data.dimensiones);
        const totalMostrado = includePP ? Number(data.ingresos || 0) : Number(data.ingresos || 0) - pp;
        return `
          <tr>
            <td><strong>${empresa}</strong></td>
            <td>${formatMoney(totalMostrado)}</td>
            <td>${data.ventas}</td>
            <td>${totalFacturas > 0 ? ((data.ventas / totalFacturas) * 100).toFixed(1) : 0}%</td>
          </tr>`;
      }).join('');
    }

    const ps = new PeriodSelector({
      container:    document.getElementById('periodoContainer'),
      showPPToggle: true,
      onChange: ({ mes, año, includePP }) => render(mes, año, includePP),
    });
    ps.init();
  </script>
</body>
</html>
