<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Ranking de Vendedores</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, Arial; background:#f7fafc; padding:24px }
    .card { max-width:1000px; margin:auto; background:#fff; padding:20px; border-radius:8px }
    h1 { margin-bottom:4px }
    .total { font-size:16px; font-weight:600; margin-bottom:16px }
    canvas { max-width:100%; height:420px }
  </style>
  <script src="../components/auth.js"></script>
  <script src="../components/utils.js"></script>
  <script src="../components/period-selector.js"></script>
  <script src="../components/nav-bar-custom.js" defer></script>
</head>
<body>
  <nav-bar-custom></nav-bar-custom>
  <div class="card">
    <h1>Ranking de vendedores</h1>

    <div id="periodoContainer"></div>

    <div id="total" class="total">Cargando...</div>
    <canvas id="chart"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    if (!Auth.isAuthenticated()) { window.location.href = '/login'; }

    async function render(mes, año, includePP) {
      const res = await authFetch(`/facturas/ranking-vendedores${mes ? `?mes=${mes}` : año ? `?año=${año}` : ''}`);
      if (!res) return;
      const resultado = (await res.json()).data;

      let data = resultado.datos.map(d => ({
        ...d,
        ingresos: includePP ? d.ingresos : (d.ingresos - (d.ingresospp || 0)),
      }));
      data.sort((a, b) => b.ingresos - a.ingresos);

      const totalIngresos = data.reduce((s, d) => s + d.ingresos, 0);
      const totalVentas   = data.reduce((s, d) => s + d.cantidadVentas, 0);

      document.getElementById('total').textContent =
        `Ingresos totales: ${formatMoney(totalIngresos)} · Ventas: ${totalVentas}`;

      const ingresos         = data.map(d => d.ingresos);
      const ventas           = data.map(d => d.cantidadVentas);
      const maxVentas        = Math.max(...ventas);
      const maxIngresos      = Math.max(...ingresos);
      const ventasEscaladas  = ventas.map(v => maxVentas ? (v / maxVentas) * maxIngresos : 0);

      const ctx = document.getElementById('chart').getContext('2d');
      if (window._chart) window._chart.destroy();

      window._chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: data.map(d => d.vendedor),
          datasets: [
            { label: 'Ingresos',           data: ingresos,       backgroundColor: '#22c55e', yAxisID: 'y' },
            { label: 'Cantidad de ventas', data: ventasEscaladas, backgroundColor: '#60a5fa', yAxisID: 'y' },
          ],
        },
        options: {
          responsive: true,
          interaction: { mode: 'nearest', intersect: false },
          scales: {
            y: {
              type: 'linear', position: 'left', beginAtZero: true,
              ticks: { callback: v => formatMoney(v) },
              title: { display: true, text: 'Ingresos / Escala de ventas' },
            },
          },
          plugins: {
            tooltip: {
              callbacks: {
                label: ctx => {
                  const idx = ctx.dataIndex;
                  if (ctx.dataset.label === 'Ingresos') return `Ingresos: ${formatMoney(ingresos[idx])}`;
                  return `Ventas: ${ventas[idx]} unidades`;
                },
              },
            },
          },
        },
      });
    }

    const ps = new PeriodSelector({
      container:    document.getElementById('periodoContainer'),
      showPPToggle: true,
      onChange: ({ mes, año, includePP }) => render(mes, año, includePP),
    });
    ps.init();
  </script>
</body>
</html>
