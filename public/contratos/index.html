<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Contratos</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, Arial; background:#f7fafc; padding:24px }
    .card { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(2,6,23,0.06) }
    h1 { margin-bottom:12px; font-size:20px }
    .section { margin-bottom:32px }
    .section-title { font-weight:600; margin-bottom:12px; color:#0f172a; font-size:14px }
    .chart-container { position: relative; height: 350px; width: 100%; margin-bottom:32px }
    .chart-circular-wrapper { max-width: 400px; margin: 0 auto; margin-bottom:32px }
    .chart-circular { position: relative; height: 350px; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #f1f5f9; padding: 8px; text-align: left; border: 1px solid #e2e8f0; font-weight: 600; font-size: 12px; }
    .data-table td { padding: 8px; border: 1px solid #e2e8f0; font-size: 14px; }
  </style>
  <script src="../components/auth.js"></script>
  <script src="../components/utils.js"></script>
  <script src="../components/pdf-section-builder.js"></script>
  <script src="../components/pdf-generator.js"></script>
  <script src="../components/period-selector.js"></script>
  <script src="../components/nav-bar-custom.js" defer></script>
</head>
<body>
  <nav-bar-custom></nav-bar-custom>
  <div class="card">
    <h1>Contratos</h1>

    <div id="periodoContainer"></div>

    <div class="section">
      <div class="section-title">Tipo de Contrato</div>
      <div class="chart-container">
        <canvas id="chartTipoContrato"></canvas>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Tipo de Contrato</th>
            <th>Total de Ventas</th>
            <th>Cantidad de Operaciones</th>
          </tr>
        </thead>
        <tbody id="tablaTipoContrato"></tbody>
      </table>
    </div>

    <div class="section">
      <div class="section-title">Segmentación de Ventas</div>
      <div class="chart-circular-wrapper">
        <div class="chart-circular">
          <canvas id="chartSegmentacion"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    if (!Auth.isAuthenticated()) { window.location.href = '/login'; }

    const COLORS = { B2B: '#0ea5a4', MARKETPLACE: '#f97316' };

    function getColorByContractType(tipo) {
      return (tipo === 'Nuevos' || tipo === 'Recompra') ? COLORS.B2B : COLORS.MARKETPLACE;
    }

    async function render(mes, año, includePP) {
      const res = await authFetch(`/facturas/contratos${mes ? `?mes=${mes}` : año ? `?año=${año}` : ''}`);
      if (!res) return;
      const resultado = (await res.json()).data;

      const tipoContratoMap = {};
      const segmentacionMap = { 'B2B': { cantidad: 0, totalVentas: 0 }, 'Marketplace': { cantidad: 0, totalVentas: 0 } };

      resultado.datos.forEach(c => {
        const tipo  = mapContractType(c.numeroContrato);   // utils.js
        const seg   = getSegmentationType(c.numeroContrato); // utils.js
        const monto = includePP ? c.totalVentas : c.totalVentasSinPP;

        if (!tipoContratoMap[tipo]) tipoContratoMap[tipo] = { totalVentas: 0, cantidad: 0 };
        tipoContratoMap[tipo].totalVentas += monto;
        tipoContratoMap[tipo].cantidad    += c.cantidad;
        segmentacionMap[seg].cantidad     += c.cantidad;
        segmentacionMap[seg].totalVentas  += monto;
      });

      const ctx1    = document.getElementById('chartTipoContrato').getContext('2d');
      const ordenFijo = ['Nuevos', 'Recompra', 'Orientación Vocacional', 'Conócete', 'Otros'];
      const labels  = ordenFijo.filter(l => tipoContratoMap[l] !== undefined);

      if (window._chart1) window._chart1.destroy();
      window._chart1 = new Chart(ctx1, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Total de ventas',
            data:  labels.map(l => tipoContratoMap[l].totalVentas),
            backgroundColor: labels.map(l => getColorByContractType(l)),
          }],
        },
        options: {
          responsive: true,
          interaction: { mode: 'nearest', intersect: false },
          maintainAspectRatio: false,
          scales: { y: { beginAtZero: true } },
          plugins: {
            legend: { display: true },
            tooltip: { callbacks: { label: ctx => formatMoney(ctx.raw) } },
          },
        },
      });

      const totalV = labels.reduce((s, l) => s + tipoContratoMap[l].totalVentas, 0);
      const totalC = labels.reduce((s, l) => s + tipoContratoMap[l].cantidad, 0);
      document.getElementById('tablaTipoContrato').innerHTML =
        labels.map(l => `
          <tr>
            <td><strong>${l}</strong></td>
            <td>${formatMoney(tipoContratoMap[l].totalVentas)}</td>
            <td>${tipoContratoMap[l].cantidad}</td>
          </tr>
        `).join('') + `
        <tr style="border-top:2px solid #cbd5e1; background:#f1f5f9">
          <td><strong>Total</strong></td>
          <td><strong>${formatMoney(totalV)}</strong></td>
          <td><strong>${totalC}</strong></td>
        </tr>`;

      const ctx2      = document.getElementById('chartSegmentacion').getContext('2d');
      const segLabels = Object.keys(segmentacionMap);
      const segCants  = segLabels.map(k => segmentacionMap[k].cantidad);
      const totalCant = segCants.reduce((a, b) => a + b, 0);

      if (window._chart2) window._chart2.destroy();
      window._chart2 = new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: segLabels,
          datasets: [{ data: segCants, backgroundColor: [COLORS.B2B, COLORS.MARKETPLACE] }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true, position: 'bottom' },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const idx = ctx.dataIndex;
                  const pct = totalCant > 0 ? ((segCants[idx] / totalCant) * 100).toFixed(1) : 0;
                  return `Ventas totales: ${segCants[idx]} (${pct}%)`;
                }
              }
            }
          }
        }
      });
    }

    const ps = new PeriodSelector({
      container:    document.getElementById('periodoContainer'),
      showPPToggle: true,
      onChange: ({ mes, año, includePP }) => render(mes, año, includePP),
    });
    ps.init();
  </script>
</body>
</html>
