<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Contratos</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, Arial; background:#f7fafc; padding:24px }
    .card { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(2,6,23,0.06) }
    h1 { margin-bottom:12px; font-size:20px }
    .mes-selector { margin-bottom:24px; display:flex; gap:12px; align-items:center }
    .mes-selector label { font-weight:600; font-size:14px }
    .mes-selector select { padding:8px 12px; border:1px solid #e2e8f0; border-radius:4px; font-size:14px; cursor:pointer; min-width:200px }
    .section { margin-bottom:32px }
    .section-title { font-weight:600; margin-bottom:12px; color:#0f172a; font-size:14px }
    .chart-container { position: relative; height: 350px; width: 100%; margin-bottom:32px }
    .chart-circular-wrapper { max-width: 400px; margin: 0 auto; margin-bottom:32px }
    .chart-circular { position: relative; height: 350px; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { background: #f1f5f9; padding: 8px; text-align: left; border: 1px solid #e2e8f0; font-weight: 600; font-size: 12px; }
    .data-table td { padding: 8px; border: 1px solid #e2e8f0; font-size: 14px; }
  </style>
  <script src="../components/auth.js"></script>
  <script src="../components/nav-bar-custom.js" defer></script>
</head>
<body>
  <nav-bar-custom></nav-bar-custom>
  <div class="card">
    <h1>Contratos</h1>    
    <div class="mes-selector">
      <label for="mesSelect">Período:</label>
      <select id="mesSelect">
        <option value="">Cargando...</option>
      </select>
    </div>
    
    <div class="section">
      <div class="section-title">Tipo de Contrato</div>
      <div class="chart-container">
        <canvas id="chartTipoContrato"></canvas>
      </div>
      <table class="data-table">
        <thead>
          <tr>
            <th>Tipo de Contrato</th>
            <th>Total de Ventas</th>
            <th>Cantidad de Operaciones</th>
          </tr>
        </thead>
        <tbody id="tablaTipoContrato">
        </tbody>
      </table>
    </div>
    
    <div class="section">
      <div class="section-title">Segmentación de Ventas</div>
      <div class="chart-circular-wrapper">
        <div class="chart-circular">
          <canvas id="chartSegmentacion"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    // Verificar autenticación
    if (!Auth.isAuthenticated()) {
      window.location.href = '/login';
    }

    async function cargarMesesYAños() {
      try {
        const res = await Auth.fetch('/facturas/meses');
        const json = await res.json();
        const mesesActual = json.data.mesesActual || [];
        const años = json.data.años || [];
        
        const mesSelect = document.getElementById('mesSelect');
        mesSelect.innerHTML = '';
        
        mesesActual.forEach(mes => {
          const option = document.createElement('option');
          option.value = `mes:${mes}`;
          const [mesNum, año] = mes.split('-');
          const mesesNombres = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
          option.textContent = `${mesesNombres[parseInt(mesNum) - 1]} ${año}`;
          mesSelect.appendChild(option);
        });

        if (mesesActual.length > 0 && años.length > 0) {
          const separator = document.createElement('option');
          separator.disabled = true;
          separator.textContent = 'Acumulados Anuales:';
          mesSelect.appendChild(separator);
        }

        años.forEach(año => {
          const option = document.createElement('option');
          option.value = `año:${año}`;
          option.textContent = `${año}`;
          mesSelect.appendChild(option);
        });
        
        if (mesesActual.length > 0) {
          mesSelect.value = `mes:${mesesActual[0]}`;
        }
      } catch (e) {
        if (e.message === 'AUTH_REQUIRED') {
          window.location.href = '/login';
          return;
        }
        console.error('Error cargando meses y años:', e);
      }
    }

    async function fetchData(mes, año) {
      try {
        let url = '/facturas/contratos';
        const params = [];
        if (mes) params.push(`mes=${mes}`);
        if (año) params.push(`año=${año}`);
        if (params.length > 0) url += '?' + params.join('&');

        const res = await Auth.fetch(url);
        const json = await res.json();
        return json.data;
      } catch(e) {
        if (e.message === 'AUTH_REQUIRED') {
          window.location.href = '/login';
          return null;
        }
        console.error(e);
        return null;
      }
    }

    const COLORS = {
      B2B: '#0ea5a4',
      MARKETPLACE: '#f97316'
    };

    function mapContractType(numeroContrato) {
      const cleaned = numeroContrato.trim().toLowerCase();
      switch(cleaned) {
        case '0001': return 'Nuevos';
        case '0002': return 'Recompra';
        case 'orientación vocacional': return 'Orientación Vocacional';
        case 'conócete': return 'Conócete';
        default: return 'Otros';
      }
    }

    function getSegmentationType(numeroContrato) {
      return (numeroContrato === '0001' || numeroContrato === '0002') ? 'B2B' : 'Marketplace';
    }

    function getColorByContractType(tipoContrato) {
      if (tipoContrato === 'Nuevos' || tipoContrato === 'Recompra') {
        return COLORS.B2B;
      }
      return COLORS.MARKETPLACE;
    }

    function formatMoney(v) {
      return new Intl.NumberFormat('es-AR', {
        style: 'currency',
        currency: 'ARS'
      }).format(v);
    }

    async function render(mes, año) {
      const resultado = await fetchData(mes, año);
      if (!resultado) return;

      const contratos = resultado.datos;

      const tipoContratoMap = {};
      const segmentacionMap = { 'B2B': { cantidad: 0, totalVentas: 0 }, 'Marketplace': { cantidad: 0, totalVentas: 0 } };

      contratos.forEach(c => {
        const tipoContrato = mapContractType(c.numeroContrato);
        const segmentacion = getSegmentationType(c.numeroContrato);
        
        if (!tipoContratoMap[tipoContrato]) {
          tipoContratoMap[tipoContrato] = { totalVentas: 0, cantidad: 0 };
        }

        tipoContratoMap[tipoContrato].totalVentas += c.totalVentas;
        tipoContratoMap[tipoContrato].cantidad    += c.cantidad;
        segmentacionMap[segmentacion].cantidad    += c.cantidad;
        segmentacionMap[segmentacion].totalVentas += c.totalVentas;
      });

      // Gráfico barras
      const ctx1 = document.getElementById('chartTipoContrato').getContext('2d');
      const ordenFijo = ['Nuevos', 'Recompra', 'Orientación Vocacional', 'Conócete', 'Otros'];
      const tipoContratoLabels = ordenFijo.filter(label => tipoContratoMap[label] !== undefined);
      const tipoContratoValues = tipoContratoLabels.map(label => tipoContratoMap[label].totalVentas);
      const tipoContratoColors = tipoContratoLabels.map(label => getColorByContractType(label));

      if (window._chart1) window._chart1.destroy();
      window._chart1 = new Chart(ctx1, {
        type: 'bar',
        data: {
          labels: tipoContratoLabels,
          datasets: [{ 
            label: 'Total de ventas', 
            data: tipoContratoValues, 
            backgroundColor: tipoContratoColors
          }]
        },
        options: {
          responsive: true,
          interaction: { mode: 'nearest', intersect: false },
          maintainAspectRatio: false,
          scales: { y: { beginAtZero: true } },
          plugins: { 
            legend: { display: true }, 
            tooltip: { callbacks: { label: ctx => `$${ctx.raw.toLocaleString()}` } } 
          }
        }
      });

      // Tabla con columna de cantidad de operaciones
      const totalVentasGlobal   = tipoContratoLabels.reduce((s, l) => s + tipoContratoMap[l].totalVentas, 0);
      const totalCantidadGlobal = tipoContratoLabels.reduce((s, l) => s + tipoContratoMap[l].cantidad, 0);

      const tbody = document.getElementById('tablaTipoContrato');
      tbody.innerHTML = tipoContratoLabels.map(label => `
        <tr>
          <td><strong>${label}</strong></td>
          <td>${formatMoney(tipoContratoMap[label].totalVentas)}</td>
          <td>${tipoContratoMap[label].cantidad}</td>
        </tr>
      `).join('') + `
        <tr style="border-top:2px solid #cbd5e1; background:#f1f5f9">
          <td><strong>Total</strong></td>
          <td><strong>${formatMoney(totalVentasGlobal)}</strong></td>
          <td><strong>${totalCantidadGlobal}</strong></td>
        </tr>
      `;

      // Gráfico circular — tooltip muestra Ventas totales (cantidad de operaciones)
      const ctx2 = document.getElementById('chartSegmentacion').getContext('2d');
      if (window._chart2) window._chart2.destroy();

      const segLabels = Object.keys(segmentacionMap);
      const segCantidades = segLabels.map(k => segmentacionMap[k].cantidad);
      const segTotalVentas = segLabels.map(k => segmentacionMap[k].totalVentas);
      const totalCantidad = segCantidades.reduce((a, b) => a + b, 0);

      window._chart2 = new Chart(ctx2, {
        type: 'doughnut',
        data: {
          labels: segLabels,
          datasets: [{ 
            data: segCantidades, 
            backgroundColor: [COLORS.B2B, COLORS.MARKETPLACE]
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: true, position: 'bottom' },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const idx = ctx.dataIndex;
                  const pct = totalCantidad > 0 ? ((segCantidades[idx] / totalCantidad) * 100).toFixed(1) : 0;
                  return [
                    `Ventas totales: ${segCantidades[idx]} (${pct}%)`,
                  ];
                }
              }
            }
          }
        }
      });
    }

    (async () => {
      await cargarMesesYAños();
      const mesSelect = document.getElementById('mesSelect');
      
      const firstValue = mesSelect.value;
      if (firstValue.startsWith('mes:')) {
        await render(firstValue.substring(4), null);
      } else if (firstValue.startsWith('año:')) {
        await render(null, firstValue.substring(4));
      }

      mesSelect.addEventListener('change', async (e) => {
        const value = e.target.value;
        if (value.startsWith('mes:')) {
          await render(value.substring(4), null);
        } else if (value.startsWith('año:')) {
          await render(null, value.substring(4));
        }
      });
    })();
  </script>
</body>
</html>
