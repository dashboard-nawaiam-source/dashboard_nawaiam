<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Dashboard General</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, Arial; background:#f7fafc; padding:24px }
    .card { max-width:900px; margin:auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(2,6,23,0.06) }
    h1 { margin-bottom:12px; font-size:20px }
    .subtitle { color:#64748b; margin-bottom:24px; font-size:13px }
    canvas { max-width:100%; height:400px }
    .demo-data { margin-top: 32px; padding-top: 16px; border-top: 1px solid #e2e8f0; }
    .demo-data table { width: 100%; border-collapse: collapse; }
    .demo-data th { background: #f1f5f9; padding: 8px; text-align: left; border: 1px solid #e2e8f0; font-weight: 600; font-size: 12px; }
    .demo-data td { padding: 8px; border: 1px solid #e2e8f0; font-size: 14px; }
    .dim-row td { background: #f8fafc; color: #475569; }
  </style>
  <script src="../components/auth.js"></script>
  <script src="../components/utils.js"></script>
  <script src="../components/pdf-section-builder.js"></script>
  <script src="../components/pdf-generator.js"></script>
  <script src="../components/period-selector.js"></script>
  <script src="../components/nav-bar-custom.js" defer></script>
</head>
<body>
  <nav-bar-custom></nav-bar-custom>
  <div class="card">
    <h1>Dashboard General</h1>

    <div id="periodoContainer"></div>

    <div class="subtitle" id="totalBruto">Cargando...</div>

    <canvas id="chart"></canvas>

    <div class="demo-data">
      <table>
        <thead>
          <tr><th>Métrica</th><th>Valor</th></tr>
        </thead>
        <tbody id="demoTable"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    if (!Auth.isAuthenticated()) { window.location.href = '/login'; }

    let _lastData  = null;
    let _lastMes   = null;
    let _lastAño   = null;
    let _includePP = false;

    async function fetchDashboard(mes, año) {
      const res = await authFetch(`/facturas/dashboardGeneral${mes ? `?mes=${mes}` : año ? `?año=${año}` : ''}`);
      if (!res) return null;
      if (!res.ok) { console.error('Error fetching dashboard'); return null; }
      return (await res.json()).data;
    }

    function render(d) {
      let dimEntries = Object.entries(d.dimensiones || {});
      if (!_includePP) dimEntries = dimEntries.filter(([k]) => !esPP(k));

      const ppVal         = calcularMontoPP(d.dimensiones);
      const totalMostrado = _includePP ? Number(d.totalVentas || 0) : Number(d.totalVentas || 0) - ppVal;

      document.getElementById('totalBruto').textContent = `Total: ${formatMoney(totalMostrado)}`;

      const labels = ['Total', ...dimEntries.map(([dim]) => dim), 'Promedio por factura', 'Cantidad facturas'];
      const values = [totalMostrado, ...dimEntries.map(([, v]) => v), d.promedioPorFactura, d.cantidadFacturas];
      const colors = ['#0ea5a4', ...dimEntries.map((_, i) => DIM_COLORS[i % DIM_COLORS.length]), '#f97316', '#60a5fa'];

      const max    = Math.max(...values.map(v => Math.abs(v) || 0));
      const scaled = values.map(v => max ? (v / max) * 100 : 0);

      const ctx = document.getElementById('chart').getContext('2d');
      if (window._finChart) window._finChart.destroy();
      window._finChart = new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets: [{ label: 'Comparación (normalizada)', data: scaled, backgroundColor: colors }] },
        options: {
          responsive: true,
          interaction: { mode: 'nearest', intersect: false },
          scales: { y: { beginAtZero: true, ticks: { callback: v => v + '%' } } },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const idx  = ctx.dataIndex;
                  const real = values[idx];
                  if (idx === labels.length - 1) return `Cantidad: ${Math.round(real)} facturas`;
                  return formatMoney(real);
                }
              }
            }
          }
        }
      });

      const filaDimensiones = dimEntries
        .map(([dim, valor]) => `<tr class="dim-row"><td>&nbsp;&nbsp;↳ ${dim}</td><td>${formatMoney(valor)}</td></tr>`)
        .join('');

      document.getElementById('demoTable').innerHTML = `
        <tr><td><strong>Total</strong></td><td>${formatMoney(totalMostrado)}</td></tr>
        ${filaDimensiones}
        <tr><td><strong>Promedio por Factura</strong></td><td>${formatMoney(d.promedioPorFactura)}</td></tr>
        <tr><td><strong>Cantidad de Facturas</strong></td><td>${d.cantidadFacturas}</td></tr>
      `;
    }

    const ps = new PeriodSelector({
      container:    document.getElementById('periodoContainer'),
      showPPToggle: true,
      onChange: async ({ mes, año, includePP }) => {
        _includePP = includePP;
        if (mes === _lastMes && año === _lastAño && _lastData) {
          render(_lastData);
          return;
        }
        _lastMes = mes; _lastAño = año;
        const data = await fetchDashboard(mes, año);
        if (data) { _lastData = data; render(data); }
      }
    });
    ps.init();
  </script>
</body>
</html>
