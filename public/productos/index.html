<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Ventas por Producto</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, Arial; background:#f7fafc; padding:24px }
    .card { max-width:1000px; margin:auto; background:#fff; padding:20px; border-radius:8px }
    h1 { margin-bottom:4px }
    canvas { max-width:100%; height:420px }
    .section-title { font-weight:600; font-size:14px; color:#0f172a; margin:32px 0 8px }
  </style>
  <script src="../components/auth.js"></script>
  <script src="../components/utils.js"></script>
  <script src="../components/period-selector.js"></script>
  <script src="../components/nav-bar-custom.js" defer></script>
</head>
<body>
  <nav-bar-custom></nav-bar-custom>
  <div class="card">
    <h1>Ventas por producto</h1>

    <div id="periodoContainer"></div>

    <div class="section-title">Por categoría</div>
    <canvas id="chart"></canvas>

    <div class="section-title">Detalle por subproducto</div>
    <canvas id="chartDetalle"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    if (!Auth.isAuthenticated()) { window.location.href = '/login'; }

    async function render(mes, año, includePP) {
      const res = await authFetch(`/facturas/ventas-por-producto${mes ? `?mes=${mes}` : año ? `?año=${año}` : ''}`);
      if (!res) return;
      const resultado = (await res.json()).data;

      // esPP y mapProducto vienen de utils.js
      const data = includePP
        ? resultado.datos
        : resultado.datos.filter(d => !esPP(d.dimensionValor));

      const productoMap = {};
      data.forEach(d => {
        const cat = mapProducto(d.producto);
        productoMap[cat] = (productoMap[cat] || 0) + d.totalVentas;
      });
      const sortedEntries = Object.entries(productoMap).sort((a, b) => b[1] - a[1]);

      const ctx = document.getElementById('chart').getContext('2d');
      if (window._chart) window._chart.destroy();
      window._chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels:   sortedEntries.map(([k]) => k),
          datasets: [{ label: 'Total vendido por producto', data: sortedEntries.map(([, v]) => v), backgroundColor: '#60a5fa' }],
        },
        options: {
          responsive: true,
          interaction: { mode: 'nearest', intersect: false },
          plugins: { tooltip: { callbacks: { label: ctx => formatMoney(ctx.raw) } } },
          scales:  { y: { ticks: { callback: v => formatMoney(v) } } },
        },
      });

      const sortedDetalle = [...data].sort((a, b) => b.totalVentas - a.totalVentas);
      const ctx2 = document.getElementById('chartDetalle').getContext('2d');
      if (window._chartDetalle) window._chartDetalle.destroy();
      window._chartDetalle = new Chart(ctx2, {
        type: 'bar',
        data: {
          labels:   sortedDetalle.map(d => d.producto || 'Sin producto'),
          datasets: [{ label: 'Total vendido por subproducto', data: sortedDetalle.map(d => d.totalVentas), backgroundColor: '#a78bfa' }],
        },
        options: {
          responsive: true,
          interaction: { mode: 'nearest', intersect: false },
          plugins: { tooltip: { callbacks: { label: ctx => formatMoney(ctx.raw) } } },
          scales:  { y: { ticks: { callback: v => formatMoney(v) } } },
        },
      });
    }

    const ps = new PeriodSelector({
      container:    document.getElementById('periodoContainer'),
      showPPToggle: true,
      onChange: ({ mes, año, includePP }) => render(mes, año, includePP),
    });
    ps.init();
  </script>
</body>
</html>
